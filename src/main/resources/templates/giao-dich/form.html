<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm mới giao dịch</title>
    <!-- Google Fonts - Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- Link to external stylesheet -->
    <link rel="stylesheet" th:href="@{/css/form.css}">
</head>
<body>

<div class="container">
    <!-- Title -->
    <h1 class="form-title">Thêm mới giao dịch</h1>

    <!-- Validation Error banner -->
    <div class="error-alert" th:if="${error != null}">
        <i class="bi bi-exclamation-triangle-fill"></i>
        <span th:text="${error}">Thông tin nhập chưa hợp lệ!</span>
    </div>

    <!-- Form content -->
    <form th:action="@{/giao-dich/add}" th:object="${dto}" method="post">
        
        <!-- Row 1: Transaction Code -->
        <div class="form-row">
            <label class="form-label" for="maGiaoDich">Mã giao dịch</label>
            <input type="text" id="maGiaoDich" th:field="*{maGiaoDich}" class="form-input" 
                   placeholder="Nhập mã giao dịch (VD: MGD-0004)" required autocomplete="off">
        </div>

        <!-- Row 2: Customer Name dropdown -->
        <div class="form-row">
            <label class="form-label" for="maKhachHang">Tên khách hàng</label>
            <select id="maKhachHang" th:field="*{maKhachHang}" class="form-input" required>
                <option value="">Chọn khách hàng</option>
                <option th:each="c : ${customers}" 
                        th:value="${c.maKhachHang}" 
                        th:text="${c.tenKhachHang}"></option>
            </select>
        </div>

        <!-- Row 3: Property Type radio buttons -->
        <div class="form-row">
            <label class="form-label">Loại bất động sản</label>
            <div class="radio-group">
                <label class="radio-label">
                    <input type="radio" th:field="*{loaiDichVu}" value="Đất" required>
                    <span>Đất</span>
                </label>
                <label class="radio-label">
                    <input type="radio" th:field="*{loaiDichVu}" value="Nhà đất" required>
                    <span>Nhà đất</span>
                </label>
            </div>
        </div>

        <!-- Row 4: Transaction Date -->
        <div class="form-row">
            <label class="form-label" for="ngayGiaoDich">Ngày giao dịch</label>
            <input type="date" id="ngayGiaoDich" th:field="*{ngayGiaoDich}" class="form-input" required>
        </div>

        <!-- Row 5: Unit Price -->
        <div class="form-row">
            <label class="form-label" for="donGia">Đơn giá (VND)</label>
            <input type="number" id="donGia" th:field="*{donGia}" step="any" min="0" class="form-input" required>
        </div>

        <!-- Row 6: Area -->
        <div class="form-row">
            <label class="form-label" for="dienTich">Diện tích (m2)</label>
            <input type="number" id="dienTich" th:field="*{dienTich}" step="any" min="0" class="form-input" required>
        </div>

        <!-- Centered Buttons Row -->
        <div class="btn-group-centered">
            <button type="submit" class="btn btn-blue">Lưu</button>
            <a th:href="@{/giao-dich}" class="btn btn-gray">Hủy</a>
        </div>
    </form>
</div>

</body>
</html>
